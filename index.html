<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隆盛くん 〜西郷どん ものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#1a1410;       /* 墨 */
    --sumi2:#241c15;
    --kin:#d9a441;        /* 金 */
    --kin-akarui:#f2cd6b;
    --aka:#b03a2e;        /* 朱 */
    --aka-fuka:#7d241c;
    --washi:#f4ead6;      /* 和紙 */
    --washi-kage:#e7d8ba;
    --midori:#5c7a4a;
    --sumi-usu:rgba(244,234,214,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #3a2c1d 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #2a1d12 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(125,36,28,.35), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#3a2c1d,#1a1410);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(217,164,65,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 隆盛の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .nobunaga{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#241c15;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  .face .mouth{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{z-index:1;}
  .face .mouth.open{z-index:2;opacity:0;}   /* ふだんは閉じた口。話すとき重ねて見せる */
  .face.talking-open .mouth.open{opacity:1;}
  .face.no-img .mouth{display:none;}
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #3a2c1d, #1a1410);
  }
  .face.no-img .face-fallback{display:flex;}
  .face.talk{} /* 話し始めの顔の動きはなし（うなずき・傾きとも無効） */
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(125,36,28,.25);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aka-fuka);font-weight:700;}

  /* 質問エリア */
  .ask-zone{
    background:rgba(36,28,21,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #511712,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #511712;}

  /* おすすめ問い */
  .topics{margin-top:8px;}
  .topics .t-label{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);margin:6px 2px 12px;letter-spacing:.08em;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(15px,1.8vw,21px);
    padding:11px 18px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);
    color:var(--washi);
    border:2px solid var(--kin);
    transition:all .15s;
  }
  .chip:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}

  .panel{display:none;}
  .panel.show{display:block;}

  /* 顔のリアクション */
  .face.seikai{box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(217,164,65,.85),0 10px 30px rgba(0,0,0,.5);}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(244,234,214,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .nobunaga{order:-1;}
  }

  /* ===== タブ ===== */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:-2px;}
  .tab{
    font-family:'Yuji Syuku',serif;font-size:clamp(16px,2vw,22px);
    padding:10px 22px;border-radius:10px 10px 0 0;cursor:pointer;
    background:rgba(244,234,214,.08);color:var(--washi);
    border:2px solid var(--kin);border-bottom:none;letter-spacing:.06em;transition:all .15s;
  }
  .tab:hover{background:rgba(217,164,65,.25);}
  .tab.active{background:var(--kin);color:var(--sumi);}

  /* ===== 年表 ===== */
  .timeline{padding:4px 2px;}
  .tl-item{display:flex;gap:12px;align-items:flex-start;cursor:pointer;padding:8px 10px;border-radius:10px;transition:background .15s;}
  .tl-item:hover{background:rgba(217,164,65,.14);}
  .tl-year{flex:0 0 auto;width:64px;text-align:right;font-family:'Yuji Syuku',serif;
    font-size:clamp(17px,2.1vw,25px);color:var(--kin-akarui);padding-top:2px;}
  .tl-line{flex:0 0 auto;position:relative;width:16px;align-self:stretch;}
  .tl-dot{width:13px;height:13px;border-radius:50%;background:var(--aka);border:3px solid var(--kin);margin:7px auto 0;position:relative;z-index:2;}
  .tl-line::before{content:"";position:absolute;left:50%;top:8px;bottom:-8px;width:3px;background:var(--kin);transform:translateX(-50%);}
  .tl-item:last-child .tl-line::before{display:none;}
  .tl-text{flex:1;font-size:clamp(15px,1.9vw,21px);font-weight:700;color:var(--washi);padding-top:4px;}

  /* ===== 地図 ===== */
  .map-box{background:#bcd6df;border:2px solid var(--kin);border-radius:14px;padding:8px;overflow:hidden;}
  #saigo-map{width:100%;height:auto;display:block;touch-action:manipulation;}
  #saigo-map .prefecture polygon,#saigo-map .prefecture path{fill:#efe3c6;stroke:#8a7553;stroke-width:1;stroke-linejoin:round;}
  #saigo-map .pref-hl polygon,#saigo-map .pref-hl path{fill:#f3d089;}
  .map-pin circle{fill:var(--aka);stroke:#fff;stroke-width:2.5;cursor:pointer;transition:r .1s;}
  .map-pin.island circle{fill:#5c7a4a;}
  .map-pin:hover circle{stroke:var(--kin-akarui);}
  #saigo-map .pin-num{fill:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  #saigo-map .map-label{fill:#241c15;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:3.5px;pointer-events:none;}
  .map-legend{font-size:clamp(13px,1.6vw,17px);color:var(--sumi-usu);margin-top:8px;letter-spacing:.04em;line-height:1.6;}

  /* ===== クイズ ===== */
  .quiz-q{font-size:clamp(18px,2.3vw,26px);font-weight:700;color:var(--kin-akarui);margin-bottom:14px;line-height:1.5;}
  .quiz-opts{display:flex;flex-direction:column;gap:10px;}
  .quiz-opt{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(16px,2vw,22px);
    padding:12px 18px;border-radius:10px;cursor:pointer;text-align:left;
    background:var(--washi);color:var(--sumi);border:2px solid var(--kin);transition:all .12s;}
  .quiz-opt:hover:not(:disabled){background:var(--kin-akarui);}
  .quiz-opt.correct{background:#5f9a4c;color:#fff;border-color:#3f7d2f;}
  .quiz-opt.wrong{background:#b84d42;color:#fff;border-color:#7d241c;}
  .quiz-opt:disabled{cursor:default;}
  .quiz-bar{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px;flex-wrap:wrap;}
  .quiz-progress{font-size:clamp(14px,1.7vw,19px);color:var(--sumi-usu);}
  .btn-next{font-family:'Yuji Syuku',serif;font-size:clamp(16px,2vw,22px);padding:10px 24px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));color:var(--washi);box-shadow:0 4px 0 #511712;letter-spacing:.08em;transition:transform .08s;}
  .btn-next:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 #511712;}
  .btn-next:disabled{opacity:.35;cursor:default;}
  .quiz-result{text-align:center;font-size:clamp(20px,2.6vw,30px);font-weight:700;color:var(--kin-akarui);padding:14px 6px;line-height:1.6;}

  /* ===== 人物相関図 ===== */
  .rel-box{background:#241c15;border:2px solid var(--kin);border-radius:14px;padding:8px;overflow:hidden;}
  #rel-map{width:100%;height:auto;display:block;touch-action:manipulation;}
  .rel-line{stroke-width:3;opacity:.5;transition:all .15s;}
  .rel-line.active{opacity:1;stroke-width:6;}
  .rel-line.dim{opacity:.12;}
  .rel-node{cursor:pointer;}
  .rel-node .rel-circ{fill:#f4ead6;stroke-width:4;transition:all .12s;}
  .rel-node:hover .rel-circ{filter:brightness(1.06);}
  .rel-node .rel-name{fill:#241c15;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  .rel-node .rel-role{fill:#f2cd6b;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:12.5px;text-anchor:middle;pointer-events:none;}
  .rel-node.active .rel-circ{stroke-width:7;}
  .rel-node.dim{opacity:.32;}
  .rel-center circle{fill:#d9a441;stroke:#7d241c;stroke-width:4;}
  .rel-center text{fill:#241c15;font-family:'Yuji Syuku',serif;font-weight:700;text-anchor:middle;}
  .rel-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:10px;font-size:clamp(13px,1.6vw,17px);color:var(--washi);letter-spacing:.03em;}
  .rel-legend span{display:inline-flex;align-items:center;gap:6px;}
  .rel-legend i{width:15px;height:15px;border-radius:50%;display:inline-block;flex:0 0 auto;}

</style>
</head>

      <div>
        <h1>隆盛くん</h1>
        <div class="sub">ばくまつ・めいじ ものしり もんどう</div>
      </div>
      <span class="mon-maru">郷</span>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="nobunaga">
        <div class="face" id="face">
          <img class="mouth closed" src="https://raw.githubusercontent.com/byakusen/gooofe.takamori_kun/main/takamori.png" alt="西郷隆盛"
               onerror="this.closest('.face').classList.add('no-img');">
          <img class="mouth open" src="https://raw.githubusercontent.com/byakusen/gooofe.takamori_kun/main/takamori2.png" alt="" aria-hidden="true">
          <span class="face-fallback">西<br>郷<br>隆<br>盛</span>
        </div>
        <div class="name-tag">西郷隆盛</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>

    <div class="tabs">
      <button class="tab active" data-tab="qa">きく</button>
      <button class="tab" data-tab="timeline">年表</button>
      <button class="tab" data-tab="map">地図</button>
      <button class="tab" data-tab="rel">相関図</button>
      <button class="tab" data-tab="quiz">クイズ</button>
    </div>

    <div class="panel show" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ 隆盛くんに きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：西南戦争ってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-timeline">
      <div class="ask-zone">

    </div>

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

// ===== タイプライター表示 =====
const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;
let mouthTimer=null;
function startMouth(){
  stopMouth();
  // 口を開いた絵と閉じた絵をすばやく切り替えて「ぱくぱく」させる
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open'); // 話し終わりは口を閉じた絵にもどす
}
function speak(text, mood){
  faceEl.classList.remove('talk','seikai','zannen'); void faceEl.offsetWidth;
  faceEl.classList.add(mood || 'talk');
  startMouth();
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); stopMouth(); return;}
    answerEl.appendChild(document.createTextNode(text[i]));
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

// ===== 入力イベント =====
const qEl=document.getElementById('q');

// IME（日本語入力）の変換確定中かどうかを記録する
let composing=false;
qEl.addEventListener('compositionstart',()=>{ composing=true; });
qEl.addEventListener('compositionend',()=>{ composing=false; });

document.getElementById('askBtn').onclick=()=>handleAsk(qEl.value);
qEl.addEventListener('keydown',e=>{
  // 漢字変換などの確定リターンでは送信しない。
  // 変換が確定し、ふつうにリターンを押したときだけ質問を送る。
  if(e.key==='Enter' && !composing && !e.isComposing){
    handleAsk(qEl.value);
  }
});

function selectRel(i){
  const nodes=relSvg.querySelectorAll('.rel-node');
  const lines=relSvg.querySelectorAll('.rel-line');
  nodes.forEach((n,j)=>{ n.classList.toggle('active',j===i); n.classList.toggle('dim',j!==i); });
  lines.forEach((l,j)=>{ l.classList.toggle('active',j===i); l.classList.toggle('dim',j!==i); });
  speak("【"+RELATIONS[i].name+"】"+RELATIONS[i].a);
}

// ===== クイズ =====
let quizIdx=0, quizScore=0;
function startQuiz(){ quizIdx=0; quizScore=0; renderQuiz(); }
function renderQuiz(){
  const area=document.getElementById('quiz-area');
  area.innerHTML='';
  if(quizIdx>=QUIZ.length){
    const res=document.createElement('div');
    res.className='quiz-result';
    res.innerHTML='ぜんぶ終わったぞ！<br>正解　'+quizScore+' / '+QUIZ.length+'問';
    area.appendChild(res);
    const bar=document.createElement('div');bar.className='quiz-bar';bar.style.justifyContent='center';
    const btn=document.createElement('button');btn.className='btn-next';btn.textContent='もう一回';
    btn.addEventListener('click',startQuiz);
    bar.appendChild(btn);area.appendChild(bar);
    let msg;
    if(quizScore===QUIZ.length) msg="あっぱれ！　全問正解じゃ。みごとな学びぶりよ。";
    else if(quizScore>=7) msg="ようできた！　たいしたものじゃ。";
    else if(quizScore>=4) msg="なかなかじゃ。年表や地図も見て、また挑戦してみよ。";
    else msg="まだまだこれからよ。年表や地図を見て、もう一度ちょうせんしてくれ。";
    speak(msg+"（正解　"+quizScore+" / "+QUIZ.length+"問）");
    return;
  }
  const item=QUIZ[quizIdx];
  const q=document.createElement('div');q.className='quiz-q';
  q.textContent='第'+(quizIdx+1)+'問　'+item.q;
  area.appendChild(q);
  const opts=document.createElement('div');opts.className='quiz-opts';
  item.o.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='quiz-opt';b.textContent=opt;
    b.addEventListener('click',()=>answerQuiz(i,b,opts,item));
    opts.appendChild(b);
  });
  area.appendChild(opts);
  const bar=document.createElement('div');bar.className='quiz-bar';
  const prog=document.createElement('div');prog.className='quiz-progress';
  prog.textContent=(quizIdx+1)+' / '+QUIZ.length+'問　　正解　'+quizScore;
  const next=document.createElement('button');next.className='btn-next';next.id='quiz-next';
  next.textContent=(quizIdx===QUIZ.length-1?'けっか ▶':'つぎへ ▶');next.disabled=true;
  next.addEventListener('click',()=>{quizIdx++;renderQuiz();});
  bar.appendChild(prog);bar.appendChild(next);
  area.appendChild(bar);
}
function answerQuiz(i,btn,opts,item){
  opts.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  if(i===item.c){
    btn.classList.add('correct');
    quizScore++;
    speak("せいかい！　"+item.a);
    faceEl.classList.add('seikai');
  }else{
    btn.classList.add('wrong');
    opts.querySelectorAll('.quiz-opt')[item.c].classList.add('correct');
    speak("おしい！　正しい答えは「"+item.o[item.c]+"」じゃ。"+item.a);
  }
  document.getElementById('quiz-next').disabled=false;
}
